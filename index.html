<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 17 Glass Player - iPhone Style</title>
    <style>
        :root {
            --ios-blur: blur(35px) saturate(180%);
            --glass-bg: rgba(255, 255, 255, 0.22);
            --border-glass: 1px solid rgba(255, 255, 255, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Background gradien estetik iOS */
            background: linear-gradient(145deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Dynamic Island */
        .dynamic-island {
            width: 120px;
            height: 35px;
            background: #000;
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 20px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 15px;
            overflow: hidden;
            z-index: 100;
        }

        /* State saat musik jalan (Dynamic Island melebar) */
        .dynamic-island.active {
            width: 200px;
            height: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Kontainer Player */
        .player-card {
            width: 350px;
            padding: 35px;
            background: var(--glass-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border-radius: 50px;
            border: var(--border-glass);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            transition: transform 0.3s ease;
        }

        /* Album Art Animasi */
        .artwork {
            width: 100%;
            aspect-ratio: 1/1;
            background: url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=500&auto=format&fit=crop') center/cover;
            border-radius: 35px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Saat Play, artwork sedikit mengecil memberi kesan 'kedalaman' */
        .playing .artwork {
            transform: scale(0.88);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .info h2 { color: #fff; font-size: 1.4rem; font-weight: 700; margin-bottom: 5px; }
        .info p { color: rgba(255,255,255,0.75); font-size: 1rem; margin-bottom: 30px; }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-bottom: 35px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            width: 45%;
            height: 100%;
            background: #fff;
            border-radius: 10px;
            position: relative;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 26px;
            transition: transform 0.2s ease, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.85);
            opacity: 0.7;
        }

        .play-btn {
            background: #fff;
            color: #000;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Animasi Wave Kecil di Dynamic Island */
        .wave {
            width: 3px;
            height: 12px;
            background: #1DB954;
            border-radius: 3px;
            display: none;
            animation: bounce 0.5s ease infinite alternate;
        }

        .active .wave { display: block; }

        @keyframes bounce {
            from { height: 4px; }
            to { height: 14px; }
        }
    </style>
</head>
<body>

    <div class="dynamic-island" id="island">
        <div class="wave" style="animation-delay: 0.1s"></div>
        <div class="wave" style="animation-delay: 0.3s"></div>
        <div class="wave" style="animation-delay: 0.2s"></div>
    </div>

    <div class="player-card" id="player">
        <div class="artwork"></div>
        
        <div class="info">
            <h2>Midnight City</h2>
            <p>M83 — Modern Classic</p>
        </div>

        <div class="progress-container">
            <div class="progress-fill"></div>
        </div>

        <div class="controls">
            <button class="btn">⏮</button>
            <button class="btn play-btn" id="mainPlay">▶</button>
            <button class="btn">⏭</button>
        </div>
    </div>

    <script>
        const playBtn = document.getElementById('mainPlay');
        const player = document.getElementById('player');
        const island = document.getElementById('island');
        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if(isPlaying) {
                playBtn.innerText = 'II';
                player.classList.add('playing');
                island.classList.add('active');
            } else {
                playBtn.innerText = '▶';
                player.classList.remove('playing');
                island.classList.remove('active');
            }
        });
    </script>
</body>
</html>
