<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kanzz.mox | Linktree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* Profile Section */
        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: url('https://github.com/Kanzzxdd.png') center/cover;
            margin-bottom: 16px;
            border: 2px solid #333;
        }

        .username { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .bio { font-size: 14px; margin-bottom: 30px; color: #aaa; }

        /* Links */
        .section-title {
            width: 100%;
            max-width: 600px;
            font-size: 14px;
            font-weight: 700;
            margin: 20px 0 12px;
            text-align: center;
            color: #888;
        }

        .link-item {
            width: 100%;
            max-width: 600px;
            background-color: #242424;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .link-item:hover {
            background-color: #333;
            transform: scale(1.02);
        }

        .link-item:active {
            transform: scale(0.98);
        }

        /* Footer / More Me */
        .more-card {
            width: 100%;
            max-width: 600px;
            background-color: #242424;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            text-align: center;
        }

        .more-name { font-weight: 700; font-size: 18px; margin-bottom: 5px; }
        .more-sub { font-size: 13px; color: #888; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="profile-img"></div>
    <h1 class="username">kanzz.mox</h1>
    <p class="bio">saving up to buy R6.</p>

    <p class="section-title">Donations:</p>
    <a href="https://tako.id/kanzzmox" class="link-item" target="_blank">Support kanzz.mox on Tako</a>

    <p class="section-title">Social Media:</p>
    <a href="https://instagram.com/kanzzxel" class="link-item" target="_blank">Kanzzxel (Instagram)</a>
    <a href="https://instagram.com/kanzz.mox" class="link-item" target="_blank">Kanzz.mox (Instagram)</a>
    <a href="https://tiktok.com/@kanzzxdd" class="link-item" target="_blank">Kanzzxdd (TikTok)</a>

    <p class="section-title">More me:</p>
    <div class="more-card">
        <p class="more-name">kanzzxdd</p>
        <p class="more-sub">🌴/kanzzxdd</p>
        <a href="https://linktr.ee/kanzzxel" class="link-item" style="background-color: #1a1a1a;">Linktree (Kanzzxdd)</a>
    </div>

</body>
</html>
